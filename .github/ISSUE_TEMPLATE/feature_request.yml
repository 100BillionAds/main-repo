name: Feature Request
description: Suggest a feature with acceptance criteria.
title: '[Feature] '
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem are you solving?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the desired behavior.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] criterion 1
        - [ ] criterion 2
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks / Dependencies
      description: Any blockers, migration concerns, external dependencies.
    validations:
      required: false

